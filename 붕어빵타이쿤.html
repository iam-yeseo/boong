<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>붕어빵 타이쿤</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
:root{
  --night:#141B33;        /* 겨울 밤하늘 */
  --night2:#1E2848;
  --tarp:#E8622C;         /* 포장마차 주황 천막 */
  --tarp-dark:#C24A1C;
  --iron:#2E2C33;         /* 무쇠 틀 */
  --iron-light:#3E3B45;
  --gold:#E9B45B;         /* 잘 익은 붕어빵 */
  --raw:#EFDDB4;
  --burnt:#5C3A22;
  --cream:#FFF6E5;
  --coal:#FF6B35;
  --ink:#241D16;
  --good:#7ECB7E;
  --bad:#E05B5B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;}
body{
  font-family:'Gowun Dodum',sans-serif;
  background:var(--night);
  color:var(--cream);
  display:flex;justify-content:center;
  overflow:hidden;
  touch-action:manipulation;
}
#app{
  width:100%;max-width:480px;height:100dvh;
  display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 120% 45% at 50% 108%, rgba(255,150,60,.22), transparent 60%),
    linear-gradient(var(--night) 0%, var(--night2) 100%);
  position:relative;overflow:hidden;
}
/* 눈 내리는 배경 */
.snow{position:absolute;top:-10px;color:rgba(255,255,255,.55);font-size:10px;pointer-events:none;animation:fall linear infinite;z-index:1;}
@keyframes fall{to{transform:translateY(105dvh) translateX(24px);}}

/* ── 천막 헤더 ── */
header{
  position:relative;z-index:5;
  background:repeating-linear-gradient(90deg,var(--tarp) 0 44px,var(--cream) 44px 88px);
  padding:10px 14px 16px;
  clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),
    95% 100%,90% calc(100% - 10px),85% 100%,80% calc(100% - 10px),
    75% 100%,70% calc(100% - 10px),65% 100%,60% calc(100% - 10px),
    55% 100%,50% calc(100% - 10px),45% 100%,40% calc(100% - 10px),
    35% 100%,30% calc(100% - 10px),25% 100%,20% calc(100% - 10px),
    15% 100%,10% calc(100% - 10px),5% 100%,0 calc(100% - 10px));
}
header .inner{
  background:rgba(36,29,22,.88);border-radius:12px;
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;
}
h1{font-family:'Jua';font-size:20px;color:var(--gold);letter-spacing:1px;line-height:1;}
h1 small{display:block;font-size:10px;color:var(--cream);opacity:.7;letter-spacing:3px;margin-top:2px;}
.stats{display:flex;gap:10px;align-items:center;font-family:'Jua';}
.money{font-size:18px;color:#FFD98A;}
.rep{font-size:12px;text-align:right;}
.rep .bar{width:64px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:3px;overflow:hidden;}
.rep .bar i{display:block;height:100%;background:var(--gold);border-radius:3px;transition:width .3s;}

/* ── 손님 줄 ── */
#customers{
  display:flex;gap:8px;padding:12px 14px 4px;min-height:96px;z-index:4;position:relative;
}
.customer{
  flex:1;max-width:33%;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);border-radius:14px;
  padding:8px 6px 6px;text-align:center;position:relative;
  animation:pop .25s ease;cursor:pointer;transition:transform .1s;
}
.customer:active{transform:scale(.95);}
.customer.leaving{animation:leave .4s ease forwards;}
@keyframes pop{from{transform:scale(.6);opacity:0;}}
@keyframes leave{to{transform:translateY(-20px);opacity:0;}}
.customer .face{font-size:26px;line-height:1;}
.customer .order{
  display:flex;align-items:center;justify-content:center;gap:4px;
  font-size:11px;margin:4px 0;font-family:'Jua';
}
.customer .order .dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(0,0,0,.25);}
.customer .patience{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.customer .patience i{display:block;height:100%;background:var(--good);border-radius:3px;transition:width .2s linear,background .3s;}
.customer .qty{position:absolute;top:-6px;right:-4px;background:var(--tarp);color:#fff;
  font-family:'Jua';font-size:11px;min-width:20px;height:20px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.4);}
#customers .empty-slot{
  flex:1;max-width:33%;border:1.5px dashed rgba(255,255,255,.1);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.25);
}

/* ── 진열대(트레이) ── */
#tray{
  margin:6px 14px;background:rgba(201,168,124,.14);
  border:1.5px solid rgba(233,180,91,.3);border-radius:12px;
  padding:6px 10px;display:flex;gap:10px;align-items:center;min-height:44px;
  z-index:4;position:relative;overflow-x:auto;
}
#tray .label{font-family:'Jua';font-size:11px;color:var(--gold);white-space:nowrap;}
.tray-item{display:flex;align-items:center;gap:3px;font-family:'Jua';font-size:13px;white-space:nowrap;}
.tray-item svg{width:26px;height:16px;}
#tray .none{font-size:11px;color:rgba(255,255,255,.35);}

/* ── 무쇠 틀(그리들) ── */
#griddle{
  flex:1;margin:4px 14px 6px;z-index:4;position:relative;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,.05), transparent 50%),
    linear-gradient(145deg,var(--iron-light),var(--iron));
  border-radius:18px;border:2px solid #1D1B21;
  box-shadow:inset 0 2px 10px rgba(0,0,0,.6), 0 4px 0 #191720, 0 0 30px rgba(255,107,53,.12);
  padding:14px 10px;
  display:grid;gap:10px;align-content:center;justify-content:center;
  grid-template-columns:repeat(2,1fr);
}
#griddle.cols3{grid-template-columns:repeat(3,1fr);}
.mold{
  position:relative;height:72px;border-radius:36px;
  background:radial-gradient(ellipse at 50% 40%, #26232B, #1B1920);
  box-shadow:inset 0 3px 8px rgba(0,0,0,.8), inset 0 -1px 2px rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s;
}
.mold:active{transform:scale(.96);}
.mold svg{width:82%;height:auto;filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));transition:filter .3s;}
.mold.cooking svg{animation:sizzle 1s ease-in-out infinite;}
@keyframes sizzle{50%{transform:translateY(-1px);}}
.mold.done svg{filter:drop-shadow(0 0 8px rgba(233,180,91,.7));}
.mold .prog{
  position:absolute;bottom:5px;left:14%;right:14%;height:4px;
  background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;
}
.mold .prog i{display:block;height:100%;border-radius:2px;background:var(--coal);transition:width .1s linear;}
.mold .badge{
  position:absolute;top:2px;right:8px;font-family:'Jua';font-size:10px;
  padding:2px 7px;border-radius:8px;background:rgba(0,0,0,.55);
}
.mold.done .badge{background:var(--good);color:#12240F;animation:blink .6s infinite;}
.mold.burnt .badge{background:var(--bad);color:#fff;}
@keyframes blink{50%{opacity:.5;}}
.mold .hint{font-size:11px;color:rgba(255,255,255,.28);font-family:'Jua';}
.steam{position:absolute;font-size:11px;opacity:0;animation:steam 1.6s ease-out infinite;pointer-events:none;}
@keyframes steam{0%{opacity:0;transform:translateY(4px);}30%{opacity:.7;}100%{opacity:0;transform:translateY(-16px);}}

/* ── 반죽(속) 선택 ── */
#fillings{
  display:flex;gap:6px;padding:2px 14px 8px;overflow-x:auto;z-index:4;position:relative;
  scrollbar-width:none;
}
#fillings::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:20px;font-family:'Jua';font-size:13px;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  color:var(--cream);cursor:pointer;transition:all .15s;
}
.chip .dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(0,0,0,.25);}
.chip.sel{background:var(--gold);color:var(--ink);border-color:var(--gold);transform:scale(1.05);}
.chip .price{font-size:10px;opacity:.65;}

/* ── 하단 바 ── */
#bottombar{
  display:flex;gap:8px;padding:0 14px 14px;z-index:4;position:relative;
}
#bottombar button{
  flex:1;font-family:'Jua';font-size:15px;padding:12px;border-radius:14px;border:none;
  cursor:pointer;transition:transform .1s;
}
#bottombar button:active{transform:scale(.96);}
#shopBtn{background:var(--tarp);color:#fff;box-shadow:0 3px 0 var(--tarp-dark);}
#shopBtn .n{background:#fff;color:var(--tarp);border-radius:8px;padding:0 6px;font-size:11px;margin-left:4px;}

/* ── 상점 시트 ── */
#shop{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  background:#241D16;border-radius:20px 20px 0 0;
  max-height:72dvh;display:flex;flex-direction:column;
  transform:translateY(105%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
#shop.open{transform:translateY(0);}
#shop .head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 8px;font-family:'Jua';font-size:17px;color:var(--gold);
}
#shop .head button{background:none;border:none;color:var(--cream);font-size:20px;cursor:pointer;}
#shop .tabs{display:flex;gap:6px;padding:0 16px 10px;}
#shop .tabs button{
  flex:1;font-family:'Jua';font-size:13px;padding:8px;border-radius:10px;border:none;
  background:rgba(255,255,255,.08);color:var(--cream);cursor:pointer;
}
#shop .tabs button.on{background:var(--gold);color:var(--ink);}
#shop .list{overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;gap:8px;}
.shop-item{
  display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);
  border-radius:12px;padding:10px 12px;
}
.shop-item .ico{font-size:22px;width:32px;text-align:center;}
.shop-item .ico .dot{width:18px;height:18px;border-radius:50%;display:inline-block;border:2px solid rgba(0,0,0,.25);}
.shop-item .info{flex:1;min-width:0;}
.shop-item .name{font-family:'Jua';font-size:14px;}
.shop-item .desc{font-size:11px;opacity:.6;margin-top:2px;}
.shop-item .buy{
  font-family:'Jua';font-size:13px;padding:8px 12px;border-radius:10px;border:none;
  background:var(--gold);color:var(--ink);cursor:pointer;white-space:nowrap;
}
.shop-item .buy:disabled{background:rgba(255,255,255,.12);color:rgba(255,255,255,.35);}
.shop-item.owned .buy{background:rgba(126,203,126,.2);color:var(--good);}
#dim{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:15;opacity:0;pointer-events:none;transition:opacity .3s;}
#dim.on{opacity:1;pointer-events:auto;}

/* ── 토스트 & 플로팅 ── */
#toast{
  position:absolute;top:14%;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(36,29,22,.92);color:var(--gold);font-family:'Jua';font-size:14px;
  padding:10px 18px;border-radius:20px;border:1.5px solid var(--gold);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;}
.float{
  position:absolute;z-index:25;font-family:'Jua';font-size:15px;pointer-events:none;
  animation:floatUp .9s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.6);
}
@keyframes floatUp{from{opacity:1;}to{opacity:0;transform:translateY(-44px);}}

/* ── 튜토리얼 ── */
#tuto{
  position:absolute;inset:0;z-index:40;background:rgba(10,13,26,.9);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
#tuto .card{
  background:#241D16;border:2px solid var(--gold);border-radius:20px;
  padding:24px 20px;max-width:340px;text-align:center;
}
#tuto h2{font-family:'Jua';color:var(--gold);font-size:22px;margin-bottom:12px;}
#tuto p{font-size:13px;line-height:1.8;opacity:.9;}
#tuto p b{color:var(--gold);}
#tuto button{
  margin-top:16px;font-family:'Jua';font-size:16px;padding:12px 32px;
  border-radius:14px;border:none;background:var(--tarp);color:#fff;cursor:pointer;
  box-shadow:0 3px 0 var(--tarp-dark);
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="inner">
      <h1>붕어빵 타이쿤<small>BUNGEO-PPANG</small></h1>
      <div class="stats">
        <div class="rep">
          <span id="lvName">노점 새내기</span>
          <div class="bar"><i id="repBar"></i></div>
        </div>
        <div class="money"><span id="money">3,000</span>원</div>
      </div>
    </div>
  </header>

  <div id="customers"></div>

  <div id="tray"><span class="label">진열대</span><span id="trayItems" style="display:flex;gap:10px;"></span></div>

  <div id="griddle"></div>

  <div id="fillings"></div>

  <div id="bottombar">
    <button id="shopBtn">🏪 상점 <span class="n" id="shopNoti" style="display:none">!</span></button>
  </div>

  <div id="dim"></div>
  <div id="shop">
    <div class="head"><span>🏪 붕어빵 상점</span><button id="shopClose">✕</button></div>
    <div class="tabs">
      <button data-tab="menu" class="on">신메뉴</button>
      <button data-tab="gear">설비</button>
    </div>
    <div class="list" id="shopList"></div>
  </div>

  <div id="toast"></div>

  <div id="tuto">
    <div class="card">
      <h2>🐟 붕어빵 타이쿤</h2>
      <p>
        아래에서 <b>속 재료</b>를 고르고 <b>빈 틀</b>을 눌러 굽기 시작!<br>
        노릇하게 익으면 <b>완성!</b> 표시가 떠요. 눌러서 진열대로 옮기세요.<br>
        너무 오래 두면 <b>타버리니</b> 주의!<br><br>
        손님이 원하는 붕어빵이 진열대에 있으면 <b>손님을 톡</b> 눌러 판매하세요.
      </p>
      <button id="tutoBtn">장사 시작!</button>
    </div>
  </div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="fish">
      <path d="M8,30 Q8,10 36,9 Q66,8 80,24 L96,10 L91,30 L96,50 L80,36 Q66,52 36,51 Q8,50 8,30 Z"
        stroke="rgba(0,0,0,.28)" stroke-width="2"/>
      <circle cx="24" cy="24" r="3" fill="rgba(0,0,0,.45)"/>
      <path d="M40,16 Q46,30 40,44 M52,15 Q58,30 52,45 M64,16 Q70,29 64,43"
        fill="none" stroke="rgba(0,0,0,.18)" stroke-width="2.5"/>
    </g>
  </defs>
</svg>

<script>
/* ══════════ 데이터 ══════════ */
const FILLINGS = [
  {id:'pat',   name:'팥',       color:'#8E3B3B', price:1000, cost:150, unlock:0,      desc:'국룰. 겨울의 클래식'},
  {id:'cream', name:'슈크림',   color:'#F6D77A', price:1500, cost:250, unlock:6000,   desc:'부드러운 커스터드'},
  {id:'choco', name:'초코',     color:'#5B3A29', price:2000, cost:350, unlock:15000,  desc:'아이들의 최애'},
  {id:'goguma',name:'고구마',   color:'#B569C4', price:2500, cost:450, unlock:30000,  desc:'달콤한 밤고구마 무스'},
  {id:'pizza', name:'피자',     color:'#E0663B', price:3000, cost:550, unlock:55000,  desc:'치즈 쭉— 늘어나는'},
  {id:'cheese',name:'크림치즈', color:'#FBF3DC', price:3500, cost:650, unlock:90000,  desc:'꾸덕한 크림치즈'},
  {id:'nutella',name:'누텔라',  color:'#3E2A1E', price:4200, cost:800, unlock:140000, desc:'헤이즐넛의 유혹'},
  {id:'mint',  name:'민트초코', color:'#5CD6C0', price:5000, cost:900, unlock:200000, desc:'호불호 끝판왕'},
];
const GEAR = [
  {id:'mold6', name:'틀 확장 (6구)',  ico:'🔥', price:12000,  desc:'한 번에 6마리를 굽는다', req:null},
  {id:'mold9', name:'틀 확장 (9구)',  ico:'🔥', price:60000,  desc:'대형 무쇠틀! 9마리 동시에', req:'mold6'},
  {id:'gas1',  name:'화력 강화 I',    ico:'⛽', price:20000,  desc:'굽는 속도 25% 증가', req:null},
  {id:'gas2',  name:'화력 강화 II',   ico:'⛽', price:80000,  desc:'굽는 속도 추가 25% 증가', req:'gas1'},
  {id:'stove', name:'연탄난로',       ico:'🪵', price:35000,  desc:'손님이 따뜻해서 30% 더 오래 기다림', req:null},
  {id:'sign',  name:'네온 간판',      ico:'💡', price:50000,  desc:'손님이 더 자주 찾아온다', req:null},
  {id:'alba',  name:'알바생 고용',    ico:'🧤', price:120000, desc:'다 익은 붕어빵을 자동으로 진열', req:null},
];
const LEVELS = [
  {name:'노점 새내기', sales:0},
  {name:'골목 명물',   sales:15},
  {name:'동네 맛집',   sales:40},
  {name:'붕어빵 장인', sales:90},
  {name:'전국 3대 붕어빵', sales:180},
  {name:'붕어빵 재벌', sales:320},
];

/* ══════════ 상태 ══════════ */
const S = {
  money:3000, sales:0,
  unlocked:['pat'], gear:{},
  sel:'pat',
  molds:[], moldCount:4,
  tray:{}, trayMax:12,
  customers:[null,null,null],
  spawnT:2.5,
};
const COOK_TIME=6.5, DONE_WINDOW=5.5;
const $=q=>document.querySelector(q);
const fmt=n=>n.toLocaleString('ko-KR');
const F=id=>FILLINGS.find(f=>f.id===id);

/* ══════════ SVG 붕어빵 ══════════ */
function fishSVG(fillColor, doneness){
  // doneness 0=반죽, 1=노릇, 2=탄
  const body = doneness===0?'#EFDDB4':doneness===1?'#E9B45B':'#4A2E1A';
  return `<svg viewBox="0 0 104 60"><use href="#fish" fill="${body}"/>
    <circle cx="52" cy="30" r="7" fill="${fillColor}" stroke="rgba(0,0,0,.2)" stroke-width="1.5" opacity="${doneness===2?0.4:0.95}"/></svg>`;
}

/* ══════════ 레벨 ══════════ */
function levelInfo(){
  let li=0;
  for(let i=0;i<LEVELS.length;i++) if(S.sales>=LEVELS[i].sales) li=i;
  const cur=LEVELS[li], next=LEVELS[li+1];
  const p = next ? (S.sales-cur.sales)/(next.sales-cur.sales) : 1;
  return {idx:li, name:cur.name, prog:Math.min(1,p)};
}

/* ══════════ 렌더 ══════════ */
function renderHUD(){
  $('#money').textContent=fmt(S.money);
  const lv=levelInfo();
  $('#lvName').textContent=lv.name;
  $('#repBar').style.width=(lv.prog*100)+'%';
  // 상점 알림: 살 수 있는 게 있으면
  const canBuy = FILLINGS.some(f=>!S.unlocked.includes(f.id)&&S.money>=f.unlock)
    || GEAR.some(g=>!S.gear[g.id]&&S.money>=g.price&&(!g.req||S.gear[g.req]));
  $('#shopNoti').style.display=canBuy?'':'none';
}
function renderFillings(){
  $('#fillings').innerHTML=S.unlocked.map(id=>{
    const f=F(id);
    return `<div class="chip ${S.sel===id?'sel':''}" data-f="${id}">
      <span class="dot" style="background:${f.color}"></span>${f.name}
      <span class="price">${fmt(f.price)}원</span></div>`;
  }).join('');
}
function renderTray(){
  const items=Object.entries(S.tray).filter(([,n])=>n>0);
  $('#trayItems').innerHTML = items.length
    ? items.map(([id,n])=>`<span class="tray-item">${fishSVG(F(id).color,1)}×${n}</span>`).join('')
    : `<span class="none">비어있음 — 붕어빵을 구워보세요</span>`;
}
function renderGriddle(){
  const g=$('#griddle');
  g.className = S.moldCount>4 ? 'cols3' : '';
  g.id='griddle';
  g.innerHTML=S.molds.map((m,i)=>{
    if(m.state==='empty')
      return `<div class="mold" data-i="${i}"><span class="hint">+ 반죽 붓기</span></div>`;
    const f=F(m.filling);
    if(m.state==='cooking'){
      const pct=Math.min(100,m.prog/COOK_TIME*100);
      return `<div class="mold cooking" data-i="${i}">${fishSVG(f.color,0)}
        <span class="steam" style="left:${20+i*7%50}%">💨</span>
        <div class="prog"><i style="width:${pct}%"></i></div></div>`;
    }
    if(m.state==='done'){
      const left=Math.max(0,1-m.doneT/DONE_WINDOW);
      return `<div class="mold done" data-i="${i}">${fishSVG(f.color,1)}
        <span class="badge">완성!</span>
        <div class="prog"><i style="width:${left*100}%;background:var(--good)"></i></div></div>`;
    }
    return `<div class="mold burnt" data-i="${i}">${fishSVG(f.color,2)}<span class="badge">탔다…</span></div>`;
  }).join('');
}
function renderCustomers(){
  $('#customers').innerHTML=S.customers.map((c,i)=>{
    if(!c) return `<div class="empty-slot">···</div>`;
    const f=F(c.filling);
    const pct=c.patience/c.maxP*100;
    const col=pct>50?'var(--good)':pct>25?'#E9B45B':'var(--bad)';
    return `<div class="customer ${c.leaving?'leaving':''}" data-c="${i}">
      <span class="qty">${c.qty}</span>
      <div class="face">${c.face}</div>
      <div class="order"><span class="dot" style="background:${f.color}"></span>${f.name}</div>
      <div class="patience"><i style="width:${pct}%;background:${col}"></i></div>
    </div>`;
  }).join('');
}
function renderShop(){
  const tab=document.querySelector('#shop .tabs .on').dataset.tab;
  let html='';
  if(tab==='menu'){
    html=FILLINGS.map(f=>{
      const owned=S.unlocked.includes(f.id);
      return `<div class="shop-item ${owned?'owned':''}">
        <div class="ico"><span class="dot" style="background:${f.color}"></span></div>
        <div class="info"><div class="name">${f.name} 붕어빵</div>
          <div class="desc">${f.desc} · 판매가 ${fmt(f.price)}원 / 재료비 ${fmt(f.cost)}원</div></div>
        <button class="buy" data-menu="${f.id}" ${owned||S.money<f.unlock?'disabled':''}>
          ${owned?'보유중':f.unlock===0?'기본':fmt(f.unlock)+'원'}</button>
      </div>`;
    }).join('');
  }else{
    html=GEAR.map(g=>{
      const owned=!!S.gear[g.id];
      const locked=g.req&&!S.gear[g.req];
      return `<div class="shop-item ${owned?'owned':''}">
        <div class="ico">${g.ico}</div>
        <div class="info"><div class="name">${g.name}</div><div class="desc">${g.desc}${locked?' · 선행 설비 필요':''}</div></div>
        <button class="buy" data-gear="${g.id}" ${owned||locked||S.money<g.price?'disabled':''}>
          ${owned?'보유중':fmt(g.price)+'원'}</button>
      </div>`;
    }).join('');
  }
  $('#shopList').innerHTML=html;
}

/* ══════════ 액션 ══════════ */
let toastT;
function toast(msg){
  const t=$('#toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1600);
}
function floatText(x,y,txt,color){
  const el=document.createElement('div');
  el.className='float';el.textContent=txt;el.style.left=x+'px';el.style.top=y+'px';el.style.color=color;
  $('#app').appendChild(el);setTimeout(()=>el.remove(),950);
}
function tapMold(i,ev){
  const m=S.molds[i];
  if(m.state==='empty'){
    const f=F(S.sel);
    if(S.money<f.cost){toast('재료비가 부족해요! 😢');return;}
    S.money-=f.cost;
    S.molds[i]={state:'cooking',filling:S.sel,prog:0,doneT:0};
  }else if(m.state==='done'){
    const total=Object.values(S.tray).reduce((a,b)=>a+b,0);
    if(total>=S.trayMax){toast('진열대가 꽉 찼어요!');return;}
    S.tray[m.filling]=(S.tray[m.filling]||0)+1;
    S.molds[i]={state:'empty'};
    if(ev)floatText(ev.clientX-$('#app').getBoundingClientRect().left,ev.clientY-80,'🐟','var(--gold)');
  }else if(m.state==='burnt'){
    S.molds[i]={state:'empty'};
    toast('탄 붕어빵은 버렸어요 🗑️');
  }
  renderGriddle();renderTray();renderHUD();
}
function tapCustomer(i,ev){
  const c=S.customers[i];
  if(!c||c.leaving)return;
  const have=S.tray[c.filling]||0;
  if(have<=0){toast(`${F(c.filling).name} 붕어빵이 없어요!`);return;}
  const give=Math.min(have,c.qty);
  S.tray[c.filling]-=give;
  c.qty-=give;
  const earn=give*F(c.filling).price;
  S.money+=earn;
  const r=$('#app').getBoundingClientRect();
  if(ev)floatText(ev.clientX-r.left,ev.clientY-r.top-20,`+${fmt(earn)}원`,'#FFD98A');
  if(c.qty<=0){
    S.sales++;
    const tip=Math.random()<0.15?Math.floor(F(c.filling).price*0.5):0;
    if(tip){S.money+=tip;toast(`팁 +${fmt(tip)}원! "잘 먹을게요~" 🥰`);}
    c.leaving=true;renderCustomers();
    setTimeout(()=>{S.customers[i]=null;renderCustomers();},380);
  }
  renderTray();renderHUD();renderCustomers();
}

/* ══════════ 손님 스폰 ══════════ */
const FACES=['👵','👴','🧑','👧','👦','👩','👨','🧕','👮','🧑‍🎄','🧑‍💼','👩‍🦰'];
function spawnCustomer(){
  const slot=S.customers.findIndex(c=>c===null);
  if(slot<0)return;
  const lv=levelInfo().idx;
  const pool=S.unlocked;
  const filling=pool[Math.floor(Math.random()*pool.length)];
  const basePat=14+lv*1.5;
  const patMul=S.gear.stove?1.3:1;
  S.customers[slot]={
    filling, qty:1+Math.floor(Math.random()*(2+Math.min(lv,3))),
    face:FACES[Math.floor(Math.random()*FACES.length)],
    patience:basePat*patMul, maxP:basePat*patMul, leaving:false,
  };
  renderCustomers();
}

/* ══════════ 게임 루프 ══════════ */
let last=performance.now(), acc=0;
function loop(now){
  const dt=Math.min(0.1,(now-last)/1000);last=now;
  let dirtyG=false,dirtyC=false;

  const speed=(S.gear.gas1?1.25:1)*(S.gear.gas2?1.25:1);
  S.molds.forEach((m,i)=>{
    if(m.state==='cooking'){
      m.prog+=dt*speed;dirtyG=true;
      if(m.prog>=COOK_TIME)m.state='done';
    }else if(m.state==='done'){
      m.doneT+=dt;dirtyG=true;
      if(S.gear.alba){
        const total=Object.values(S.tray).reduce((a,b)=>a+b,0);
        if(total<S.trayMax){S.tray[m.filling]=(S.tray[m.filling]||0)+1;S.molds[i]={state:'empty'};renderTray();}
      }
      if(m.doneT>=DONE_WINDOW&&m.state==='done')m.state='burnt';
    }
  });

  S.customers.forEach((c,i)=>{
    if(!c||c.leaving)return;
    c.patience-=dt;dirtyC=true;
    if(c.patience<=0){
      c.leaving=true;toast('손님이 그냥 가버렸어요… 💢');
      setTimeout(()=>{S.customers[i]=null;renderCustomers();},380);
    }
  });

  S.spawnT-=dt;
  if(S.spawnT<=0){
    spawnCustomer();
    const lv=levelInfo().idx;
    const base=Math.max(3.2, 8-lv*0.9)*(S.gear.sign?0.7:1);
    S.spawnT=base*(0.7+Math.random()*0.6);
  }

  acc+=dt;
  if(acc>0.12){acc=0;if(dirtyG)renderGriddle();if(dirtyC)renderCustomers();}
  requestAnimationFrame(loop);
}

/* ══════════ 이벤트 ══════════ */
document.addEventListener('click',ev=>{
  const mold=ev.target.closest('.mold');
  if(mold){tapMold(+mold.dataset.i,ev);return;}
  const cust=ev.target.closest('.customer');
  if(cust){tapCustomer(+cust.dataset.c,ev);return;}
  const chip=ev.target.closest('.chip');
  if(chip){S.sel=chip.dataset.f;renderFillings();return;}
  const menuBtn=ev.target.closest('[data-menu]');
  if(menuBtn){
    const f=F(menuBtn.dataset.menu);
    if(S.money>=f.unlock){S.money-=f.unlock;S.unlocked.push(f.id);
      toast(`${f.name} 붕어빵 출시! 🎉`);renderFillings();renderShop();renderHUD();}
    return;
  }
  const gearBtn=ev.target.closest('[data-gear]');
  if(gearBtn){
    const g=GEAR.find(x=>x.id===gearBtn.dataset.gear);
    if(S.money>=g.price){
      S.money-=g.price;S.gear[g.id]=true;
      if(g.id==='mold6'){S.moldCount=6;S.trayMax=18;}
      if(g.id==='mold9'){S.moldCount=9;S.trayMax=24;}
      while(S.molds.length<S.moldCount)S.molds.push({state:'empty'});
      toast(`${g.name} 구매 완료! ✨`);
      renderGriddle();renderShop();renderHUD();
    }
    return;
  }
});
$('#shopBtn').onclick=()=>{$('#shop').classList.add('open');$('#dim').classList.add('on');renderShop();};
$('#shopClose').onclick=$('#dim').onclick=()=>{$('#shop').classList.remove('open');$('#dim').classList.remove('on');};
document.querySelectorAll('#shop .tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#shop .tabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');renderShop();
});
$('#tutoBtn').onclick=()=>{$('#tuto').remove();spawnCustomer();};

/* ══════════ 초기화 ══════════ */
for(let i=0;i<S.moldCount;i++)S.molds.push({state:'empty'});
for(let i=0;i<14;i++){
  const s=document.createElement('div');s.className='snow';s.textContent='❄';
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(6+Math.random()*8)+'s';
  s.style.animationDelay=(-Math.random()*10)+'s';
  s.style.fontSize=(6+Math.random()*8)+'px';
  $('#app').appendChild(s);
}
renderHUD();renderFillings();renderTray();renderGriddle();renderCustomers();
requestAnimationFrame(loop);
</script>
</body>
</html>
